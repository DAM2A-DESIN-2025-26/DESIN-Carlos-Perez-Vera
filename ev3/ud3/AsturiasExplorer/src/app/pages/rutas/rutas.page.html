<app-header></app-header>

<ion-content class="ion-padding">
  <h1>{{ titulo }}</h1>
  <p>{{ descripcion }}</p>
  
  <ion-list>
    @for (ruta of rutas; track ruta.nombre) {
      <ion-item>
        <img [src]="ruta.imagen" alt="{{ ruta.nombre }}" />
        <ion-label>
          <h2>{{ ruta.nombre }}</h2>
          <p>Zona: {{ ruta.zona }}</p>
          <p>Dificultad: {{ ruta.dificultad }}</p>
        </ion-label>
      </ion-item>
    }
  </ion-list>
  
  <app-footer></app-footer>
</ion-content>
