<app-header></app-header>

<ion-content class="ion-padding">
  <h1>{{ titulo }}</h1>
  <p>{{ descripcion }}</p>
  
  <!-- Card principal de bienvenida -->
  <ion-card>
    <img src="URL_IMAGEN_ASTURIAS" alt="Asturias" />
    <ion-card-header>
      <ion-card-title>{{ tituloBienvenida }}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      {{ textoBienvenida }}
    </ion-card-content>
  </ion-card>
  
  <!-- Grid con 2 cards de acceso rápido -->
  <ion-grid>
    <ion-row>
      <!-- Card Rutas -->
      <ion-col size="12" size-md="6">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Rutas</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            Explora las mejores rutas de montaña
            <ion-button expand="block" routerLink="/rutas">Ver rutas</ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>
      
      <!-- Card Gastronomía -->
      <ion-col size="12" size-md="6">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Gastronomía</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            Descubre los sabores de Asturias
            <ion-button expand="block" routerLink="/gastro">Ver gastronomía</ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
  
  <app-footer></app-footer>
</ion-content>
