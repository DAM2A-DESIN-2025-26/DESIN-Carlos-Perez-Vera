<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Iniciar Sesión</ion-card-title>
    </ion-card-header>
    
    <ion-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="login()">
        
        <ion-item>
          <ion-label position="stacked">Usuario</ion-label>
          <ion-input formControlName="username" type="text" placeholder="emilys"></ion-input>
        </ion-item>
        
        <ion-item>
          <ion-label position="stacked">Contraseña</ion-label>
          <ion-input formControlName="password" type="password" placeholder="emilyspass"></ion-input>
        </ion-item>
        
        <ion-button 
          expand="block" 
          type="submit" 
          [disabled]="loginForm.invalid"
          class="ion-margin-top">
          Entrar
        </ion-button>
        
        <p class="ion-text-center ion-margin-top">
          <small>
            Usuario de prueba: <strong>emilys</strong><br>
            Contraseña: <strong>emilyspass</strong>
          </small>
        </p>
      </form>
    </ion-card-content>
  </ion-card>
</ion-content>
