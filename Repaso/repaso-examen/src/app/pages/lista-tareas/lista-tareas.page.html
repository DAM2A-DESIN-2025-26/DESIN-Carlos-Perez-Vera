<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Mi Agenda de Examen</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Nueva Tarea</ion-card-title>
    </ion-card-header>
    
    <ion-card-content>
      <form [formGroup]="miFormulario" (ngSubmit)="agregarTarea()">
        <ion-item>
          <ion-label position="stacked">¿Qué tienes que hacer?</ion-label>
          <ion-input formControlName="titulo" placeholder="Ej. Estudiar Ionic"></ion-input>
        </ion-item>

        <ion-button expand="block" type="submit" [disabled]="miFormulario.invalid" style="margin-top: 10px;">
          <ion-icon name="add-outline" slot="start"></ion-icon>
          Guardar Tarea
        </ion-button>
      </form>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-list-header>
      <ion-label>Listado de Tareas</ion-label>
    </ion-list-header>

    @for (t of tareasService.tareas(); track t.id) {
      <app-tarea-item 
        [tarea]="t" 
        (onCambiarEstado)="cambiarEstado($event)">
      </app-tarea-item>
    } @empty {
      <ion-item lines="none">
        <ion-label color="medium" class="ion-text-center">No hay tareas pendientes</ion-label>
      </ion-item>
    }
  </ion-list>
</ion-content>
