<ion-app>
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Pelis App Menu</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        <ion-item button routerLink="/dashboard/listado" menuClose>
          <ion-icon slot="start" name="film-outline"></ion-icon>
          <ion-label>Listado de Pelis</ion-label>
        </ion-item>

        <ion-item button routerLink="/dashboard/perfil" menuClose>
          <ion-icon slot="start" name="person-circle-outline"></ion-icon>
          <ion-label>Mi Perfil</ion-label>
        </ion-item>

        <ion-item button (click)="openAboutModal()">
          <ion-icon slot="start" name="information-circle-outline"></ion-icon>
          <ion-label>Acerca de la App</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <div id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>
</ion-app>
